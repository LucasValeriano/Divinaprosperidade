<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/vite.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimório de São Bento PWA</title>
    <meta property="og:image" content="https://bolt.new/static/og_default.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body cz-shortcut-listen="true">
    <div id="root">
        <div
            class="min-h-screen bg-gradient-to-b from-[#0F1419] via-[#1A1A2E] to-[#0F1419] flex items-center justify-center px-4">
            <div class="max-w-md w-full space-y-8">
                <div class="text-center">
                    <div class="flex justify-center mb-6">
                        <div
                            class="w-32 h-32 rounded-full bg-gradient-to-br from-[#D4AF37] to-[#C9A961] p-1 shadow-2xl shadow-[#D4AF37]/30">
                            <div class="w-full h-full rounded-full bg-[#1A1A2E] flex items-center justify-center"><svg
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" class="w-20 h-20 text-[#D4AF37]">
                                    <circle cx="12" cy="12" r="9" stroke-width="1.5"></circle>
                                    <circle cx="12" cy="12" r="6.5" stroke-width="1"></circle>
                                    <path d="M12 5.5 L12 8.5" stroke-width="1.5"></path>
                                    <path d="M12 15.5 L12 18.5" stroke-width="1.5"></path>
                                    <path d="M5.5 12 L8.5 12" stroke-width="1.5"></path>
                                    <path d="M15.5 12 L18.5 12" stroke-width="1.5"></path>
                                    <path d="M7.8 7.8 L9.5 9.5" stroke-width="1.5"></path>
                                    <path d="M14.5 14.5 L16.2 16.2" stroke-width="1.5"></path>
                                    <path d="M16.2 7.8 L14.5 9.5" stroke-width="1.5"></path>
                                    <path d="M9.5 14.5 L7.8 16.2" stroke-width="1.5"></path>
                                    <circle cx="12" cy="12" r="2" fill="currentColor"></circle>
                                </svg></div>
                        </div>
                    </div>
                    <h1 class="text-4xl font-serif text-[#D4AF37] mb-2">Grimório de São Bento</h1>
                    <p class="text-[#C0C0C0] text-sm">Acesse seu conteúdo exclusivo</p>
                </div>
                <form class="mt-8 space-y-6 bg-[#2C2C3E] p-8 rounded-lg border border-[#D4AF37]/20 shadow-xl">
                    <div class="space-y-4">
                        <div><label for="email" class="block text-sm font-medium text-[#D4AF37] mb-2">Email</label>
                            <div class="relative"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round"
                                    class="lucide lucide-mail absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-[#C9A961]">
                                    <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                                </svg><input id="email" type="email" required=""
                                    class="w-full pl-10 pr-4 py-3 bg-[#1A1A2E] border border-[#D4AF37]/30 rounded-lg text-[#FAFAFA] placeholder-[#C0C0C0]/50 focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent transition-all"
                                    placeholder="seu@email.com" value=""><kpm-field-badge type="default" loading="false"
                                    menu-type="login" class="kpm_input-field-button kpm_gray-key-icon"
                                    style="--FieldBadge-ZLevel: 3 !important;"
                                    data-product-type="b2c"></kpm-field-badge></div>
                        </div>
                        <div><label for="password" class="block text-sm font-medium text-[#D4AF37] mb-2">Senha</label>
                            <div class="relative"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round"
                                    class="lucide lucide-lock absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-[#C9A961]">
                                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg><input id="password" type="password" required=""
                                    class="w-full pl-10 pr-4 py-3 bg-[#1A1A2E] border border-[#D4AF37]/30 rounded-lg text-[#FAFAFA] placeholder-[#C0C0C0]/50 focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent transition-all"
                                    placeholder="••••••••" value=""><kpm-field-badge type="default" loading="false"
                                    menu-type="login" class="kpm_input-field-button kpm_gray-key-icon"
                                    style="--FieldBadge-ZLevel: 3 !important;"
                                    data-product-type="b2c"></kpm-field-badge></div>
                        </div>
                    </div><button type="submit"
                        class="w-full bg-gradient-to-r from-[#D4AF37] to-[#C9A961] text-[#0F1419] py-3 px-4 rounded-lg font-semibold hover:shadow-lg hover:shadow-[#D4AF37]/30 transition-all transform hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed">Entrar</button>
                    <div class="text-center"><button type="button"
                            class="text-[#D4AF37] hover:text-[#CFB53B] text-sm transition-colors">Primeiro acesso?
                            Clique aqui</button></div>
                </form>
                <p class="text-center text-xs text-[#C0C0C0]/70 mt-6">Conteúdo exclusivo para contribuintes</p>
            </div>
        </div>
    </div>


    <div id="extension-mmplj"></div>
</body>

</html>
